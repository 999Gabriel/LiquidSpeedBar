name: LiquidSpeedBar
options:
  minimumXcodeGenVersion: 2.39.0
configs:
  Debug: debug
  Release: release
settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: 14.0
    SWIFT_VERSION: 6.0
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
targets:
  LiquidSpeedBar:
    type: application
    platform: macOS
    sources:
      - path: Sources/LiquidSpeedBar
    info:
      path: Config/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.the999gabriel.liquidspeedbar
        PRODUCT_NAME: LiquidSpeedBar
        CODE_SIGN_STYLE: Automatic
        OTHER_LDFLAGS:
          - "$(inherited)"
          - "-framework"
          - "SystemConfiguration"
schemes:
  LiquidSpeedBar:
    build:
      targets:
        LiquidSpeedBar: all
    run:
      config: Debug
    archive:
      config: Release
